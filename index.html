<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
/>

  <meta name="theme-color" content="#2f3542" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LineDraw" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-512.png" />
  <link rel="stylesheet" href="style.css" />

  <title>Line Draw Game</title>
</head>
<body>
  <div id="splash-screen">
  <div class="splash-content">
    <img src="icons/icon-512.png" alt="Line Draw Logo" class="splash-logo" />
    <h1 class="splash-title">Line Draw</h1>
  </div>
</div>

<h1>Line Draw</h1>

<div id="menu-screen">
  <h2>Schwierigkeit wählen</h2>

  <div id="difficulty-buttons" class="menu-buttons"></div>

  <div id="scoreboard">
  <h3>Dein Fortschritt</h3>
  <p id="score-easy">Easy: Level 1</p>
  <p id="score-medium">Medium: Level 1</p>
  <p id="score-hard">Hard: Level 1</p>
</div>

  <button id="reset-progress-btn">Fortschritt zurücksetzen</button>
</div>

<p id="level-indicator">Level</p>

<button id="back-to-menu-btn" style="display: none;">Menü</button>

<div id="game-board"></div>

<div class="button-row">
  <button id="reset-btn">Reset</button>
  <button id="next-level-btn" style="display: none;">Nächstes Level</button>
</div>

<p id="win-message" style="display:none;">
  🎉 Gewonnen!
</p>
<
<script src="levels_generated_easy.js"></script>
<script src="levels_generated_medium.js"></script>
<script src="levels_generated_hard.js"></script>
<script src="levels_seed.js"></script>
<script src="levels.js"></script>
<script src="script.js"></script>
</body>
</html>
